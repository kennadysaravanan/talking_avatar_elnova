<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Talking Avatar (standalone)</title>
  <!-- LiveKit client from CDN — no npm/build needed -->
  <script src="https://cdn.jsdelivr.net/npm/livekit-client@2.6.0/dist/livekit-client.umd.min.js"></script>
  <style>
    body { margin:0; background:#0b0d10; color:#e8eaed; font-family:system-ui,sans-serif; }
    .wrap { max-width:760px; margin:0 auto; padding:24px; }
    input, button { font-size:15px; }
    .api { width:100%; padding:8px; margin:6px 0 14px; border-radius:8px;
           border:1px solid #333; background:#15181c; color:#e8eaed; }
    /* contain (not cover) so the FULL avatar shows — no crop. Box adapts to the video aspect
       (portrait full-body or landscape head-shot both fit). */
    .stage { position:relative; width:100%; max-height:78vh; background:#000; border-radius:12px;
             overflow:hidden; display:flex; align-items:center; justify-content:center; }
    video { max-width:100%; max-height:78vh; object-fit:contain; }
    .overlay { position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
               background:rgba(0,0,0,.6); font-size:18px; }
    .row { display:flex; gap:8px; margin-top:14px; }
    .row input { flex:1; padding:10px; border-radius:8px; border:1px solid #333; background:#15181c; color:#e8eaed; }
    .row button { padding:10px 18px; border:none; border-radius:8px; background:#3b82f6; color:#fff; cursor:pointer; }
    #log { margin-top:12px; font-size:12px; color:#8b95a1; white-space:pre-wrap; max-height:160px; overflow:auto; }
    .err { color:#ff6b6b; }
  </style>
</head>
<body>
  <div class="wrap">
    <h2>Real-Time Talking Avatar</h2>

    <label>Orchestrator API base:</label>
    <input id="api" class="api" value="https://c83lajsrf707wd-8080.proxy.runpod.net" />

    <div id="uploadBox">
      <p>Upload a realistic 2D photo to begin.</p>
      <input id="file" type="file" accept="image/*" />
    </div>

    <div class="stage" id="stage" style="display:none">
      <video id="video" autoplay playsinline></video>
      <div class="overlay" id="overlay">Preparing your avatar…</div>
    </div>

    <div class="row" id="chatRow" style="display:none">
      <input id="text" placeholder="Ask something…" />
      <button id="send">Send</button>
    </div>

    <div id="log"></div>
  </div>

  <script>
    const LK = window.LivekitClient;
    const $ = (id) => document.getElementById(id);
    const log = (m, err) => { const d=$("log"); d.innerHTML += `<div class="${err?'err':''}">${m}</div>`; d.scrollTop=d.scrollHeight; };

    let ws = null, room = null, sessionId = null;
    const apiBase = () => $("api").value.replace(/\/$/,"");

    $("file").addEventListener("change", async (e) => {
      const f = e.target.files[0]; if (!f) return;
      $("uploadBox").style.display = "none";
      $("stage").style.display = "block";
      try {
        log("Uploading photo, creating session…");
        const fd = new FormData(); fd.append("photo", f);
        const res = await fetch(apiBase()+"/session", { method:"POST", body:fd });
        if (!res.ok) { const j = await res.json().catch(()=>({})); throw new Error(j.detail||("HTTP "+res.status)); }
        const info = await res.json();
        sessionId = info.session_id;
        log("Session "+sessionId+" — connecting to LiveKit room "+info.room);

        room = new LK.Room({ adaptiveStream:true });
        room.on(LK.RoomEvent.TrackSubscribed, (track) => {
          if (track.kind === LK.Track.Kind.Video) {
            track.attach($("video")); log("Video track attached ✅"); $("overlay").style.display="none";
          } else if (track.kind === LK.Track.Kind.Audio) {
            const el = track.attach(); el.autoplay = true; el.volume = 1.0;
            document.body.appendChild(el);
            // browsers may block autoplay until a gesture — try, and fall back to click-to-play
            const tryPlay = () => el.play().catch(() => {});
            tryPlay();
            document.body.addEventListener("click", tryPlay, { once: true });
            log("Audio track attached 🔊 (if silent, click the page once)");
          }
        });
        await room.connect(info.livekit_url, info.viewer_token);
        log("Connected to LiveKit. Waiting for avatar frames…");

        // control WS for text in / state out
        const wsUrl = apiBase().replace(/^http/,"ws") + "/ws/" + sessionId;
        ws = new WebSocket(wsUrl);
        ws.onopen = () => log("Control channel open. You can chat now.");
        ws.onmessage = (m) => log("event: "+m.data);
        ws.onerror = () => log("WS error", true);
        $("chatRow").style.display = "flex";
      } catch (err) {
        log("ERROR: "+(err.message||err), true);
        $("overlay").textContent = "Error — see log";
      }
    });

    const send = () => {
      const t = $("text").value.trim();
      if (!t || !ws || ws.readyState !== 1) return;
      ws.send(JSON.stringify({ type:"text", text:t }));
      log("you: "+t);
      $("text").value = "";
    };
    $("send").addEventListener("click", send);
    $("text").addEventListener("keydown", (e) => { if (e.key==="Enter") send(); });
  </script>
</body>
</html>
